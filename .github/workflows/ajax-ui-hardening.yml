name: AJAX UI Hardening

on:
  push:
    branches:
      - stable
      - main
  pull_request:
  workflow_dispatch:

jobs:
  ajax-ui-hardening:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none

      - name: Run AJAX/UI hardening regression runner
        run: php tools/governance/run-ajax-ui-hardening-regression.php
